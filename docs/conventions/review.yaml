# review.yaml — レビュー規約
# Opus Agent 並列レビューの基準と構成
# 要素記法: i(アイテム — 全要素の基本), c(子要素リスト — i の下にネスト), n(ノート — 補足説明)

- i: "レビュー方針"
  c:
    - i: "レビューは Opus モデルの Agent を並列起動して実行する"
    - i: "各 Agent にはシステム開発担当者のロールを割り当てる"
    - i: "開発フェーズとレイヤーに応じて、起動する Agent の数（ウェイト）を変える"
    - i: "各 Agent は独立してレビューし、結果を統合する"
    - i: "ドメインを跨ぐ変更は整合性レビューを追加する"

- i: "ロール定義"
  c:
    - i: "senior-architect（シニアアーキテクト）"
      c:
        - i: "全体構成の整合性、レイヤー分離の正しさ、依存方向の検証"
        - i: "DDD 4層構成の遵守、YAGNI 違反の検出"
        - i: "ドメイン境界の適切さ、集約ルートの設計"
        - i: "必読ソース"
          c:
            - i: "docs/DESIGN.md"
            - i: "docs/conventions/*"
            - i: "docs/domains/*/def.yaml — 全ドメインのエンティティ定義"
            - i: "docs/domains/*/ref.yaml — 全ドメインの参照関係"
            - i: "CLAUDE.md — アーキテクチャセクション"
      n: "設計フェーズで最も重要。実装フェーズでも構造的逸脱を検出する"
    - i: "mcp-designer（MCPデザイナー）"
      c:
        - i: "MCP ツール定義の適切さ（名前、説明、パラメータ）"
        - i: "Streamable HTTP の設計、Cloud Run との整合性"
        - i: "CC からの利用体験（ツールの発見しやすさ、パラメータの直感性）"
        - i: "必読ソース"
          c:
            - i: "docs/domains/{domain}/fn-*.yaml — ui セクション"
            - i: "libs/domains/{domain}/backend/entrypoint/ — MCPハンドラ"
            - i: "docs/domains/{domain}/detaildesign.md — entrypoint セクション"
      n: "entrypoint/ 層と MCP 設定に関わるレビュー"
    - i: "ux-designer（UXデザイナー）"
      c:
        - i: "CC ユーザー（森川大我）にとっての使いやすさ"
        - i: "エラーメッセージの明確さ、レスポンスの情報量"
        - i: "ツールの命名とパラメータが直感的か"
        - i: "必読ソース"
          c:
            - i: "docs/domains/{domain}/fn-*.yaml — ui セクション"
            - i: "docs/domains/{domain}/rule.yaml — ユーザー影響のあるルール"
      n: "紬では UI = MCP ツール。CC との対話がフロント"
    - i: "sdd-auditor（SDD監査員）"
      c:
        - i: "スキーマ駆動: define/ のインターフェースが先に定義されているか"
        - i: "実装が define/ の契約に従っているか"
        - i: "入出力の型が厳密に定義されているか、曖昧な any/interface{} がないか"
        - i: "proto 定義（将来）との整合性"
        - i: "必読ソース"
          c:
            - i: "docs/domains/{domain}/def.yaml"
            - i: "docs/domains/{domain}/fn-*.yaml — interface セクション"
            - i: "libs/domains/{domain}/backend/define/ — 型定義コード"
            - i: "docs/domains/{domain}/detaildesign.md — Go 型定義セクション"
      n: "契約が先、実装が後。逆転を検出する"
    - i: "ddd-auditor（DDD監査委員）"
      c:
        - i: "ドメインロジックが usecase/ に閉じているか"
        - i: "infrastructure/ にビジネスロジックが漏れていないか"
        - i: "エンティティと値オブジェクトの区別が正しいか"
        - i: "ユビキタス言語: コード内の命名がビジネス用語と一致しているか"
        - i: "ドメイン間参照が ref.yaml に記載された範囲内か"
        - i: "必読ソース"
          c:
            - i: "docs/domains/{domain}/def.yaml"
            - i: "docs/domains/{domain}/rule.yaml"
            - i: "docs/domains/{domain}/ref.yaml"
            - i: "libs/domains/{domain}/backend/define/"
            - i: "libs/domains/{domain}/backend/usecase/"
      n: "ドメインの純粋性を守る番人"
    - i: "go-hacker（Goハッカー）"
      c:
        - i: "Go の慣習（Effective Go）への準拠"
        - i: "エラーハンドリングの網羅性（_ 握りつぶし検出）"
        - i: "goroutine / channel の安全性（該当する場合）"
        - i: "パフォーマンス: 不要なアロケーション、N+1 クエリ"
        - i: "import の整理、命名規約の遵守"
        - i: "必読ソース"
          c:
            - i: "レビュー対象の *.go ファイル"
            - i: "go.mod — 依存ライブラリ"
            - i: "docs/conventions/coding.yaml"
            - i: "docs/conventions/naming.yaml"
      n: "Go コードの品質を担保。実装フェーズで最も多く起動する"
    - i: "nextjs-pro（Next.jsプロフェッショナル）"
      c:
        - i: "フロントエンド実装の品質（将来用）"
        - i: "Server Components / Client Components の使い分け"
        - i: "パフォーマンス、アクセシビリティ"
        - i: "必読ソース"
          c:
            - i: "フロント関連コード（将来定義）"
      n: "現フェーズでは使用しない。フロント追加時に起動する"
    - i: "security-analyst（セキュリティア��リスト）"
      c:
        - i: "認証・認可の正しさ（Cloud Run IAM 設定）"
        - i: "scope 認可: EndpointConfig の AllowedRoles/Scopes 設定の正しさ"
        - i: "JWT claims の検証（roles, actingRole, scopes の整合性）"
        - i: "PII 暗号化: infrastructure/ での暗号化/復号の正しさ、鍵管理"
        - i: "SQL インジェクション対策（プレースホルダ使用の徹底）"
        - i: "機密情報の取り扱い（環境変数、Secret Manager）"
        - i: "入力バリデーションの網羅性"
        - i: "GCS のアクセス制御、オブジェクトバージョニング"
        - i: "必読ソース"
          c:
            - i: "libs/domains/{domain}/backend/infrastructure/ — SQL・外部接続"
            - i: "libs/domains/{domain}/backend/entrypoint/ — 入力受付"
            - i: "libs/platform/ — 接続実体"
            - i: "Dockerfile"
            - i: "docs/domains/{domain}/schema.yaml — テーブル定義"
            - i: "docs/domains/{domain}/detaildesign.md — 認証・デプロイセクション"
      n: "全フェーズで起動するが、インフラ・デプロイ時にウェイト増"
    - i: "test-engineer（テストエンジニア）"
      c:
        - i: "テストカバレッジの十分性（正常系・異常系・境界値）"
        - i: "モックの設計が適切か（過剰モック、不足モック）"
        - i: "テーブル駆動テストの活用"
        - i: "テストの独立性（他テストへの依存がないか）"
        - i: "統合テストの環境設計"
        - i: "必読ソース"
          c:
            - i: "libs/domains/{domain}/backend/*/testdata/*.yaml — テスト定義（必須）"
            - i: "libs/domains/{domain}/backend/*/*_test.go — テストコード（必須）"
            - i: "docs/domains/{domain}/fn-*.yaml — エラーケース一覧（必須）"
            - i: "docs/domains/{domain}/rule.yaml — ビジネスルール（必須）"
            - i: "docs/conventions/testing.yaml"
            - i: "docs/conventions/test-coverage.yaml"
      n: "テストデータとビジネスルール定義の両方を必ず読む。片方だけでは網羅性を判断できない"
    - i: "infra-sre（インフラ/SRE）"
      c:
        - i: "Cloud Run 設定の適切さ（メモリ、CPU、コンカレンシー）"
        - i: "Dockerfile の最適化（マルチステージ、レイヤーキャッシュ）"
        - i: "接続プール設定、タイムアウト設定"
        - i: "環境変数管理、Secret Manager 連携"
        - i: "ヘルスチェック、ログ出力設計"
        - i: "必読ソース"
          c:
            - i: "Dockerfile"
            - i: "libs/platform/ — 接続管理コード"
            - i: "docs/domains/{domain}/detaildesign.md — デプロイセクション"
            - i: "docs/domains/{domain}/schema.yaml — DB 設計"
            - i: "docs/domains/{domain}/store.yaml — ストア設計"
      n: "デプロイ・インフラ設定のレビュー"

- i: "レビュー種別とAgent構成"
  c:
    - i: "basic-design（基本設計レビュー）"
      c:
        - i: "対象: def.yaml, rule.yaml, store.yaml, ref.yaml, schema.yaml, fn-*.yaml"
        - i: "Agent構成（計6体）"
          c:
            - i: "senior-architect × 2"
            - i: "ddd-auditor × 1"
            - i: "sdd-auditor × 1"
            - i: "mcp-designer × 1"
            - i: "ux-designer × 1"
      n: "設計の方向性と構造を固めるフェーズ。アーキテクチャとドメイン設計が最重要"

    - i: "detail-design（詳細設計レビュー）"
      c:
        - i: "対象: detaildesign.md"
        - i: "Agent構成（計7体）"
          c:
            - i: "senior-architect × 1"
            - i: "sdd-auditor × 2"
            - i: "ddd-auditor × 1"
            - i: "security-analyst × 1"
            - i: "mcp-designer × 1"
            - i: "test-engineer × 1"
      n: "曖昧排除が目的。型・インターフェースの厳密性と非機能要件が重要"

    - i: "impl-define（define/ 実装レビュー）"
      c:
        - i: "対象: libs/domains/{domain}/backend/define/"
        - i: "Agent構成（計5体）"
          c:
            - i: "sdd-auditor × 2"
            - i: "ddd-auditor × 1"
            - i: "go-hacker × 1"
            - i: "senior-architect × 1"
      n: "契約の正しさが最重要。ここがズレると全層に波及する"

    - i: "impl-usecase（usecase/ 実装レビュー）"
      c:
        - i: "対象: libs/domains/{domain}/backend/usecase/"
        - i: "Agent構成（計6体）"
          c:
            - i: "go-hacker × 2"
            - i: "ddd-auditor × 1"
            - i: "test-engineer × 2"
            - i: "sdd-auditor × 1"
      n: "ビジネスロジックの正しさとテスト品質が最重要"

    - i: "impl-infrastructure（infrastructure/ 実装レビュー）"
      c:
        - i: "対象: libs/domains/{domain}/backend/infrastructure/"
        - i: "Agent構成（計6体）"
          c:
            - i: "go-hacker × 2"
            - i: "security-analyst × 1"
            - i: "test-engineer × 1"
            - i: "sdd-auditor × 1"
            - i: "infra-sre × 1"
      n: "SQL品質、セキュリティ（SQLインジェクション対策）、platform連携が重要"

    - i: "impl-entrypoint（entrypoint/ 実装レビュー）"
      c:
        - i: "対象: libs/domains/{domain}/backend/entrypoint/"
        - i: "Agent構成（計5体）"
          c:
            - i: "mcp-designer × 2"
            - i: "go-hacker × 1"
            - i: "ux-designer × 1"
            - i: "security-analyst × 1"
      n: "MCPツールの使いやすさ、DI組み立ての正しさが重要"

    - i: "impl-interpoint（interpoint/ 実装レビュー）"
      c:
        - i: "対象: libs/domains/{domain}/backend/interpoint/"
        - i: "Agent構成（計5体）"
          c:
            - i: "go-hacker × 1"
            - i: "security-analyst × 2"
            - i: "sdd-auditor × 1"
            - i: "senior-architect × 1"
      n: "mTLS 認証、Proto 変換の正しさ、サービス間通信のセキュリティが重要"

    - i: "impl-platform（platform/ 実装レビュー）"
      c:
        - i: "対象: libs/platform/"
        - i: "Agent構成（計5体）"
          c:
            - i: "go-hacker × 2"
            - i: "infra-sre × 2"
            - i: "security-analyst × 1"
      n: "接続管理、エラーハンドリング、セキュリティが重要"

    - i: "impl-shared（shared/ 実装レビュー）"
      c:
        - i: "対象: libs/shared/（test-runner-go 以外の共通パッケージ）"
        - i: "Agent構成（計5体）"
          c:
            - i: "go-hacker × 2"
            - i: "sdd-auditor × 1"
            - i: "senior-architect × 1"
            - i: "test-engineer × 1"
      n: "共通コードの品質と interface 設計が重要。複数ドメインに影響するため慎重にレビュー"

    - i: "test-design（テストデータレビュー）"
      c:
        - i: "対象: testdata/*.yaml"
        - i: "Agent構成（計6体）"
          c:
            - i: "test-engineer × 2"
            - i: "sdd-auditor × 1"
            - i: "ddd-auditor × 1"
            - i: "go-hacker × 1"
            - i: "security-analyst × 1"
      n: "テストケースの網羅性、境界値、異常系カバレッジが最重要。セキュリティ観点のテストケース漏れも検出"

    - i: "test-code（テストコードレビュー）"
      c:
        - i: "対象: *_test.go, testutil/"
        - i: "Agent構成（計5体）"
          c:
            - i: "test-engineer × 2"
            - i: "go-hacker × 2"
            - i: "sdd-auditor × 1"
      n: "テストコードの品質、モックの適切さ、YAML ローダーの正しさが重要"

    - i: "test-runner（テストランナーレビュー）"
      c:
        - i: "対象: libs/shared/testutil/"
        - i: "Agent構成（計5体）"
          c:
            - i: "go-hacker × 2"
            - i: "test-engineer × 2"
            - i: "infra-sre × 1"
      n: "YAML パーサーの堅牢性、CI/CD 互換性、パフォーマンスが重要"

    - i: "deploy（デプロイ・インフラレビュー）"
      c:
        - i: "対象: Dockerfile, gcloud コマンド, IAM 設定, 環境変数"
        - i: "Agent構成（計5体）"
          c:
            - i: "infra-sre × 2"
            - i: "security-analyst × 2"
            - i: "senior-architect × 1"
      n: "本番環境のセキュリティと安定性が最重要"

    - i: "cross-domain（ドメイン横断レビュー）"
      c:
        - i: "対象: 複数ドメインに跨る変更"
        - i: "Agent構成（計6体）"
          c:
            - i: "senior-architect × 2"
            - i: "ddd-auditor × 2"
            - i: "sdd-auditor × 1"
            - i: "security-analyst × 1"
      n: "ドメイン境界の整合性、ref.yaml との一致、依存方向の正しさが最重要"

    - i: "ui-impact（UI 影響レビュー）"
      c:
        - i: "対象: スキーマ変更時の fn-*.yaml ui セクション、Figma デザインへの影響"
        - i: "Agent構成（計4体）"
          c:
            - i: "ux-designer × 1"
            - i: "mcp-designer × 1"
            - i: "ddd-auditor × 1"
            - i: "test-engineer × 1"
        - i: "確認項目"
          c:
            - i: "新フィールド追加 → 表示 UI に反映が必要か"
            - i: "型変更 → フォームバリデーション・表示ロジックに影響するか"
            - i: "fn-*.yaml の ui セクション更新が必要か"
            - i: "Figma デザインの再生成が必要か（Code Connect マッピングの破損）"
      n: "UI がある場合のみ実施。API/CLI 専用プロジェクトではスキップ"

    - i: "full（フルレビュー）"
      c:
        - i: "対象: リリース前、マイルストーン完了時"
        - i: "Agent構成（計10体 — 全ロール各1体）"
          c:
            - i: "senior-architect × 1"
            - i: "mcp-designer × 1"
            - i: "ux-designer × 1"
            - i: "sdd-auditor × 1"
            - i: "ddd-auditor × 1"
            - i: "go-hacker × 1"
            - i: "security-analyst × 1"
            - i: "test-engineer × 1"
            - i: "infra-sre × 1"
            - i: "nextjs-pro × 1"
      n: "全観点からの総合レビュー。マージ前の最終確認に使用"

- i: "拡張レビュー観点（プロジェクト成熟に応じて項目を追加）"
  c:
    - i: "SEC — セキュリティ（scope 認可、PII 暗号化、JWT 検証）"
    - i: "INV — 不変条件（define/ の制約、ビジネスルール違反の検出）"
    - i: "ERR — エラーハンドリング（エラー伝播、ラップ、センチネル）"
    - i: "TST — テスト品質（3層同期、カバレッジ、境界値）"
    - i: "SHR — 共有コード影響（shared/ 変更の下流影響）"
    - i: "PLT — プラットフォーム（platform/ の接続管理、リトライ）"
    - i: "ABS — 抽象化（過剰/不足な抽象化の検出）"
    - i: "EVT — イベント（ドメインイベントの発行/購読の正しさ）"
    - i: "ALN — 整合性（test.spec.md ↔ YAML ↔ Go テストの3層同期）"
  n: "各カテゴリの具体的なチェック項目はプロジェクト進行に応じて追加する。初期は枠のみ"

- i: "grep 残骸チェック（リネーム時の必須手順）"
  c:
    - i: "エンティティ名、関数名、変数名をリネームした場合、旧名称の grep を実行する"
    - i: "旧名称の残骸（コメント、テストデータ、設計書内の参照）をすべて更新する"
    - i: "/rev の STEP として追加: レビュー前に grep 残骸チェックを実行する"
  n: "リネーム漏れはコンパイルエラーにならない箇所（コメント、YAML、Markdown）で発生しやすい"

- i: "proto/statics レビュー（api-schema 変更時）"
  c:
    - i: "後方互換性チェック: フィールド削除・型変更がないか確認する"
    - i: "フィールド番号の再利用禁止"
    - i: "エラーコード番号帯の重複チェック（domain-codes.yaml）"
    - i: "変更サマリの確認: 追加/変更/削除フィールドが明記されているか"
  n: "Proto 変更は下流に波及する。後方互換性が壊れる場合は事前合意必須"

- i: "レビュー結果の出力形式"
  c:
    - i: "各 Agent はロール名、指摘事項（severity: critical/warning/info）、改善案を返す"
    - i: "severity: critical は必ず修正する。warning は検討する。info は参考情報"
    - i: "統合結果をユーザーに提示し、critical が 0 件になるまで修正を繰り返す"
