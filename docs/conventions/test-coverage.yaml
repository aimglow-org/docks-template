# test-coverage.yaml — テストカバレッジ規約
# 設計時・テスト定義時に検討すべきケースのチェックリスト
# 要素記法: i(アイテム — 全要素の基本), c(子要素リスト — i の下にネスト), n(ノート — 補足説明)

- i: "この規約の位置づけ"
  c:
    - i: "設計時（basic-design, detail-design）に検討すべきケースの網羅リスト"
    - i: "/rev レビュー時にこのチェックリストを参照し、漏れを検出する"
    - i: "shared/testutil/validator はこのチェックリストの一部を機械的に検証する"
  n: "チェックリストは人間/CC の判断を支援する。validator は機械的に検証可能な部分のみ担う"

- i: "問題の切り分け基準"
  c:
    - i: "テスト定義の問題"
      c:
        - i: "validator が「ケース不足」を指摘 → testdata YAML を追加する"
        - i: "レビューで「このケースがない」と指摘 → testdata YAML を追加する"
      n: "修正対象: testdata/*.yaml"
    - i: "実装の問題"
      c:
        - i: "テストが FAIL → コードを修正する"
        - i: "テストは通るがレビューで「実装が不適切」と指摘 → コードを修正する"
      n: "修正対象: *.go（テスト定義は正しい）"
    - i: "業務ルール定義の問題"
      c:
        - i: "テストは全 PASS だがレビューで「仕様自体が曖昧」と指摘"
        - i: "正常系の定義が不明確で、何が正しい結果か判断できない"
      n: "修正対象: rule.yaml, def.yaml, fn-*.yaml（設計に戻る）"

# ==================================================
# ケース分類チェックリスト
# ==================================================

- i: "正常系（Normal）"
  c:
    - i: "基本正常系"
      c:
        - i: "全必須パラメータを指定した場合の成功"
        - i: "必須パラメータのみ（任意パラメータ省略）での成功"
        - i: "全パラメータ（必須+任意）を指定した場合の成功"
    - i: "バリエーション"
      c:
        - i: "各 enum 値ごとの正常系（SessionType の solviento, dock/* 等）"
        - i: "配列パラメータの 0件/1件/複数件"
        - i: "文字列パラメータの最短有効値/通常値/長い値"
    - i: "組み合わせ"
      c:
        - i: "フィルタ条件の単独指定/複数指定"
        - i: "ページネーションの先頭ページ/中間ページ/最終ページ"
  n: "正常系が曖昧なら、まず rule.yaml を確認する"

- i: "異常系（Error）"
  c:
    - i: "入力バリデーションエラー"
      c:
        - i: "必須パラメータの欠落（空文字、nil）"
        - i: "型不正（数値に文字列、UUID に不正文字列）"
        - i: "範囲外の値（負数、上限超過）"
        - i: "不正な enum 値（許可値以外の文字列）"
        - i: "不正なフォーマット（日時形式の不正、パスの不正文字）"
      n: "正常系の各パラメータに対して、必ず対応する異常系を用意する"
    - i: "ビジネスルール違反"
      c:
        - i: "不正な状態遷移（Captured → Archived への直接遷移等）"
        - i: "不変条件の違反（変更不可フィールドの更新等）"
        - i: "参照整合性違反（存在しない ID の参照）"
        - i: "権限違反（該当する場合）"
    - i: "リソース不在"
      c:
        - i: "ID 指定で存在しないレコードを検索"
        - i: "検索条件に該当するデータが 0 件"
  n: "異常系は「正常系の裏返し」。正常系 1 件に対し、異常系は複数件あるのが普通"

- i: "準正常系（Semi-Normal）"
  c:
    - i: "部分的成功"
      c:
        - i: "主系統は成功するが、副系統が失敗（例: CloudSQL 成功、GCS 失敗）"
        - i: "best-effort 処理の失敗がログに記録されるか"
        - i: "部分失敗時のレスポンスが適切か（成功部分の情報は返るか）"
    - i: "デグレード動作"
      c:
        - i: "オプショナル機能の欠落時の挙動（GCS 未設定時等）"
        - i: "キャッシュ不在時のフォールバック（該当する場合）"
    - i: "境界値"
      c:
        - i: "Limit = 0（デフォルト値に補正されるか）"
        - i: "Limit = 最大値（上限に切り詰められるか）"
        - i: "Limit = 最大値 + 1（切り詰められるか）"
        - i: "Offset = 0（先頭）"
        - i: "Offset = 総件数以上（空配列が返るか）"
        - i: "空配列の入力（tags = []）"
        - i: "空文字列の任意パラメータ"
  n: "準正常系は「動くけど完全ではない」状態。エラーにならないが、期待と異なる可能性がある"

- i: "障害系（Failure）"
  c:
    - i: "インフラ障害"
      c:
        - i: "DB 接続失敗（ネットワーク不通、タイムアウト）"
        - i: "DB クエリエラー（テーブル不在、権限不足）"
        - i: "GCS 接続失敗"
        - i: "GCS アップロード失敗（権限不足、容量不足）"
    - i: "リソース枯渇"
      c:
        - i: "コネクションプール枯渇"
        - i: "メモリ不足（巨大な RawLog 等）"
        - i: "タイムアウト（長時間クエリ）"
    - i: "データ不整合"
      c:
        - i: "DB に不正なデータが存在する場合の読み取り"
        - i: "JSONB フィールドの不正な JSON"
        - i: "NULL が入っている NOT NULL 想定のフィールド（レガシーデータ）"
  n: "障害系は infrastructure/ 層と platform/ 層でテストする。usecase/ ではモック化してエラー伝播を検証"

# ==================================================
# 層別チェックリスト
# ==================================================

- i: "層別の検討すべきケース"
  c:
    - i: "define/ 層"
      c:
        - i: "値オブジェクトの IsValid(): 全有効値 + 全無効値パターン"
        - i: "enum 型: 全定数値のカバー + 未定義値の拒否"
        - i: "エラー型: 各エラーが errors.Is() で判定可能か"
    - i: "usecase/ 層"
      c:
        - i: "正常系: 全バリエーション"
        - i: "異常系: 各バリデーションエラーごとに 1 ケース以上"
        - i: "準正常系: best-effort 処理の失敗パターン"
        - i: "障害系: Repository/Storage エラー時のエラー伝播"
        - i: "副作用検証: モックの呼び出し回数/引数パターン"
    - i: "infrastructure/ 層"
      c:
        - i: "CRUD 操作: 各操作の正常系"
        - i: "検索: 各フィルタ条件の単独/組み合わせ"
        - i: "境界値: 空テーブル検索、大量データ検索"
        - i: "障害系: 接続エラー時のエラーメッセージ"
        - i: "SQL インジェクション: 特殊文字を含む入力"
    - i: "entrypoint/ 層"
      c:
        - i: "API パラメータ→内部型の変換: 正��系 + 型不正"
          n: "MCP パラメータ、gRPC リクエスト等。API 形式に応じて読み替える"
        - i: "内部型→API レスポンスの変換: 全フィールド"
        - i: "エラーレス���ンス: 各エラー種別のレスポンス形式"
        - i: "権限マトリクステスト: 全ロール × 全 RPC の組み合わせ（認可がある場合）"
        - i: "認証フローチェーン: Signup → Login → Token → Protected API（認証がある場合）"
    - i: "interpoint/ 層（ドメイン間通信がある場合）"
      c:
        - i: "サービス間リクエスト→内部型の変換: 正常系 + 型不正"
        - i: "mTLS 認証の検証（証明書なし、無効証明書）"
        - i: "usecase/dto/ の Proto ↔ Domain 変換の正確性"
    - i: "platform/ 層"
      c:
        - i: "接続成功/失敗"
        - i: "クエリ実行成功/失敗"
        - i: "接続切断後の再接続（該当する場合）"
        - i: "タイムアウト設定の動作確認"

# ==================================================
# validator が検証するルール
# ==================================================

- i: "validator 検証ルール"
  c:
    - i: "必須検証（error レベル — 違反はテスト実行をブロック）"
      c:
        - i: "各 input の必須パラメータに対して、欠落時の異常系ケースが存在する"
        - i: "各 fn-*.yaml の usecase.error_cases に対応するテストケースが存在する"
        - i: "正常系が最低 1 件存在する"
        - i: "want.error が null のケース（正常系）と null でないケース（異常系）の両方が存在する"
      n: "これらがないテスト定義は不完全。実装に入る前に修正する"
    - i: "世代管理テスト（世代管理パターン使用時のみ）"
      c:
        - i: "未来世代の作成: effective_from が未来日付"
        - i: "有効期間重複の拒否: 既存世代と重複する期間"
        - i: "effective_to < effective_from の拒否"
        - i: "current_{table} ビューの正確性: 現在有効なレコードのみ返すか"
        - i: "世代切り替え: 期間終了時の自動切り替え"
      n: "design.yaml の世代管理パターンを適用している場合に追加する"
    - i: "シナリオテスト（マルチステップフロー）"
      c:
        - i: "認証フロー: Signup → Login → Token → Protected API"
        - i: "CRUD フロー: Create → Read → Update → Delete → Read（not found）"
        - i: "状態遷移フロー: 全状態遷移パスを網羅"
      n: "entrypoint/ 層の e2e テストで実施する"
    - i: "推奨検証（warning レベル — 違反はログ出力のみ）"
      c:
        - i: "境界値テストの存在（Limit の 0/最大/最大+1 等）"
        - i: "配列パラメータの 0件/1件/複数件テスト"
        - i: "mock の side_effect 検証（呼び出し回数確認）"
        - i: "準正常系（best-effort 失敗）のテスト"
        - i: "障害系（DB 接続エラー等）のテスト"
      n: "warning は品質向上の提案。無視しても実装に進める"
    - i: "情報提供（info レベル — 参考情報）"
      c:
        - i: "テストケース総数と正常系/異常系/準正常系/障害系の内訳"
        - i: "カバーされていない enum 値"
        - i: "テストデータに含まれる日本語の概要一覧"
  n: "validator は品質の底上げが目的。厳しすぎて開発を止めることは避ける"

- i: "validator の入力"
  c:
    - i: "testdata/*.yaml — テストデータ定義"
    - i: "docs/domains/{domain}/def.yaml — エンティティ定義（必須パラメータの特定に使用）"
    - i: "docs/domains/{domain}/rule.yaml — ビジネスルール（状態遷移等の検証に使用）"
    - i: "docs/domains/{domain}/fn-*.yaml — 機能仕様（エラーケースの網羅性に使用）"
  n: "設計 YAML とテスト YAML の整合性を検証する。これが validator の本質"

- i: "validator の出力形式"
  c:
    - i: |
        === Test Coverage Validation ===

        [ERROR] save_dialogue_test.yaml:
          - Missing error case for required field: session_id (empty)
          - Missing error case for: ErrInvalidSessionType (defined in fn-dialogue-save.yaml)

        [WARNING] save_dialogue_test.yaml:
          - No boundary value test for: Limit (recommend: 0, 20, 100, 101)
          - No side_effect verification in case: "正常系_全項目指定"

        [INFO] save_dialogue_test.yaml:
          - Total: 8 cases (normal: 3, error: 3, semi-normal: 1, failure: 1)
          - Missing enum coverage: SessionType "dock/*" variant

        Summary: 2 errors, 2 warnings, 2 infos
        Status: FAIL (errors must be resolved before implementation)
