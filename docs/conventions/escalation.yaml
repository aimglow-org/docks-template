# escalation.yaml — 設計エスカレーション規約
# 実装中に設計変更が必要になった場合の対処手順
# 要素記法: i(アイテム — 全要素の基本), c(子要素リスト — i の下にネスト), n(ノート — 補足説明)

- i: "エスカレーションとは"
  c:
    - i: "実装中に業務ルールの曖昧さや設計の不整合を発見し、基本設計（*.yaml）の修正が必要になること"
    - i: "実装の問題ではなく、設計の問題であると判断された時に発生する"
  n: "「コードを直す」ではなく「設計を直す」が必要な状況"

- i: "エスカレーション発生条件"
  c:
    - i: "def.yaml の修正（エンティティ・値オブジェクトの変更）"
    - i: "rule.yaml の修正（ビジネスルールの追加・変更）"
    - i: "fn-*.yaml の修正（interface/usecase/ui の変更）"
    - i: "store.yaml / schema.yaml の修正（テーブル構造の変更）"
    - i: "ref.yaml の修正（ドメイン間参照の変更）"
    - i: "新規 fn-*.yaml の追加"
  n: "docs/domains/{domain}/ 配下の YAML 編集はすべてエスカレーション対象"

- i: "エスカレーション対処手順"
  c:
    - i: "Step 1: 設計変更の実施"
      c:
        - i: "該当する *.yaml を修正する"
        - i: "変更理由をコミットメッセージに明記する"
        - i: "即時コミットする"
    - i: "Step 2: /rev basic-design レビュー実施"
      c:
        - i: "変更された YAML に対して /rev basic-design を実行する"
        - i: "他の YAML との整合性を検証する"
        - i: "critical 指摘が 0 件になるまで修正する"
    - i: "Step 3: detaildesign.md の整合性確認"
      c:
        - i: "detaildesign.md を読み込み、変更された YAML との不整合を検出する"
        - i: "不整合がある場合、detaildesign.md を更新する"
        - i: "更新後、/rev detail-design を実行する"
    - i: "Step 4: 他機能との不整合確認"
      c:
        - i: "同ドメイン内の他の fn-*.yaml との整合性を確認する"
        - i: "ref.yaml が変更された場合、参照元ドメインの設計も確認する"
        - i: "不整合がある場合、該当ファイルを修正し、/rev cross-domain を実行する"
    - i: "Step 5: テスト定義の更新チェック"
      c:
        - i: "testdata/*.yaml を読み込む"
        - i: "変更された設計に対して、テストケースの追加・修正が必要か確認する"
        - i: "確認観点"
          c:
            - i: "新しい必須パラメータが追加された → 欠落時の異常系テストが必要"
            - i: "ビジネスルールが変更された → 旧ルールのテストを更新、新ルールのテストを追加"
            - i: "エラーケースが追加された → 対応するテストケースが必要"
            - i: "enum 値が追加された → 新値の正常系テストが必要"
            - i: "状態遷移が変更された → 旧遷移テストの修正、新遷移テストの追加"
            - i: "世代管理が追加/変更された → 有効期間関連テストの追加（重複、境界、未来世代）"
            - i: "scope/権限が追加/変更された → 権限マトリクステストの更新（全ロール × 全 RPC）"
        - i: "テスト定義を更新したら /test validate を実行する"
        - i: "/rev test-design を実行する"
    - i: "Step 6: 実装コードへの影響確認"
      c:
        - i: "既に実装済みのコードに影響があるか確認する"
        - i: "影響がある場合、修正タスク（impl-{nnn}.prog.md）を新規作成する"
        - i: "既存の .done.md タスクは変更しない（履歴として保持）"

- i: "エスカレーションの記録"
  c:
    - i: "コミットメッセージの type に 'refactor' または 'fix' を使用する"
    - i: "body にエスカレーション理由を記載する"
    - i: "コミットメッセージ例"
      c:
        - i: |
            refactor(dialogue): def.yaml SessionType に dock/* バリデーション追加

            エスカレーション理由: 実装時に dock/ プレフィックスなしの
            文字列が SessionType として受け入れられる問題を発見。
            rule.yaml のバリデーションルールが不足していた。

            影響範囲:
            - def.yaml: SessionType.IsValid() の仕様変更
            - rule.yaml: バリデーションルール追加
            - detaildesign.md: value.go の実装更新
            - testdata/save_dialogue_test.yaml: 異常系ケース追加

- i: "エスカレーション判断基準"
  c:
    - i: "エスカレーションする（設計に戻る）"
      c:
        - i: "テストの期待値が何か判断できない → rule.yaml が曖昧"
        - i: "新しいエラーケースが必要 → fn-*.yaml にエラー定義がない"
        - i: "型の追加・変更が必要 → def.yaml の定義不足"
        - i: "テーブル構造の変更が必要 → store.yaml / schema.yaml の設計不足"
    - i: "エスカレーションしない（実装を直す）"
      c:
        - i: "テストが FAIL → コードのバグ"
        - i: "コンパイルエラー → コードの記述ミス"
        - i: "パフォーマンス問題 → 実装の最適化（設計は変わらない）"
  n: "迷ったら Solviento に戻る。Dock で方針判断しない"
