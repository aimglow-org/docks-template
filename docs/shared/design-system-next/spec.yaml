# spec.yaml — design-system-next コンポーネントカタログ
# 各コンポーネントの使用例、組み合わせパターン、禁止パターン
# 要素記法: i(アイテム — 全要素の基本), c(子要素リスト — i の下にネスト), n(ノート — 補足説明)
#
# このファイルはテンプレートのスケルトン。
# /des 実行時にプロジェクトの具体的なコンポーネントで具体化する。

- i: "カタログ構成"
  c:
    - i: "各コンポーネントに記載する項目"
      c:
        - i: "variants — バリエーション一覧（size, color, state）"
        - i: "使用例 — 典型的な使い方"
        - i: "組み合わせパターン — 他のコンポーネントとの推奨組み合わせ"
        - i: "禁止パターン — やってはいけない使い方"
        - i: "アクセシビリティ — aria 要件、キーボード操作"
  n: "def.yaml が『何があるか（契約）』、spec.yaml が『どう使うか（仕様）』"

- i: "primitives/"
  c:
    - i: "（プロジェクト初期化時に定義する）"

- i: "composites/"
  c:
    - i: "（プロジェクト初期化時に定義する）"

- i: "layouts/"
  c:
    - i: "（プロジェクト初期化時に定義する）"
